<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>マイ給与明細</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    body { font-family: sans-serif; background-color: #f0f2f5; margin: 0; padding: 15px; color: #333; }
    .container { max-width: 500px; margin: 0 auto; background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    h2 { color: #0056b3; margin-top: 0; text-align: center; font-size: 22px; }
    
    .profile-area { text-align: center; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid #eee; }
    .staff-name { font-size: 20px; font-weight: bold; color: #333; }
    
    .filter-area { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
    .filter-inputs { display: flex; gap: 10px; }
    .select-box, .date-box { padding: 12px; font-size: 16px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-weight: bold; }
    .select-box { width: 40%; }
    .date-box { flex: 1; text-align: center; }

    .btn { padding: 15px; background-color: #06C755; color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; width: 100%; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    
    #loading, #errorScreen { text-align: center; padding: 20px; font-weight: bold; display: none; }
    #errorScreen { color: #d9534f; }
    
    .salary-card { background: #e8f4fd; border: 2px solid #b6d4fe; border-radius: 10px; padding: 20px 15px; margin-top: 15px; display: none; }
    .total-pay { font-size: 32px; font-weight: bold; color: #d9534f; text-align: center; margin: 15px 0; border-bottom: 2px dashed #b6d4fe; padding-bottom: 15px; }
    
    /* スマホに最適化した2列レイアウト */
    .detail-flex { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #cce0ff; }
    .detail-flex:last-child { border-bottom: none; padding-bottom: 0; }
    .df-name { font-weight: bold; color: #333; font-size: 16px; display: flex; align-items: center; gap: 6px; }
    .df-right { text-align: right; }
    .df-amount { font-size: 18px; font-weight: bold; color: #333; margin-bottom: 4px; }
    .df-calc { font-size: 13px; color: #666; }

    .error-msg { background: #f8d7da; color: #721c24; padding: 10px; border-radius: 5px; font-size: 13px; margin-top: 15px; }
  </style>
</head>
<body>

  <div class="container">
    <h2>💴 マイ給与明細</h2>
    
    <div id="loading" style="display: block;">⏳ 認証情報を取得中...</div>
    <div id="errorScreen">🚫 権限がありません</div>

    <div id="appContent" style="display: none;">
      <div class="profile-area">
        <div class="staff-name">👤 <span id="displayName">読込中...</span> さん</div>
      </div>

      <div class="filter-area">
        <div class="filter-inputs">
          <select id="periodType" class="select-box" onchange="togglePeriodInput()">
            <option value="month">月別</option>
            <option value="year">年度別</option>
          </select>
          <input type="month" id="targetMonth" class="date-box">
          <select id="targetYear" class="date-box" style="display: none;"></select>
        </div>
        <button class="btn" onclick="fetchMySalary()">明細を見る</button>
      </div>

      <div id="calcLoading" style="display: none; text-align: center; font-weight: bold; color: #666; padding: 20px;">
        🔄 計算しています...
      </div>

      <div id="salaryCard" class="salary-card">
        <div style="text-align: center; font-weight: bold; color: #0056b3; margin-bottom: 5px;">支給予定額</div>
        <div class="total-pay" id="dispTotal">¥0</div>
        
        <div class="detail-flex">
          <div class="df-name">🦺 現場実務</div>
          <div class="df-right">
            <div class="df-amount" id="dispGenbaAmt">0円</div>
            <div class="df-calc" id="dispGenbaCalc">0時間00分 × 0円</div>
          </div>
        </div>
        
        <div class="detail-flex">
          <div class="df-name">💻 事務仕事</div>
          <div class="df-right">
            <div class="df-amount" id="dispJimuAmt">0円</div>
            <div class="df-calc" id="dispJimuCalc">0時間00分 × 0円</div>
          </div>
        </div>
        
        <div class="detail-flex">
          <div class="df-name">🛥️ 船舶手当</div>
          <div class="df-right">
            <div class="df-amount" id="dispShipAmt">0円</div>
            <div class="df-calc" id="dispShipCalc">0日 × 0円</div>
          </div>
        </div>
        
        <div id="errorBox" class="error-msg" style="display: none;"></div>
      </div>
      
      <div id="noDataMsg" style="display: none; text-align: center; padding: 30px 10px; color: #666; font-weight: bold;">
        指定された期間の勤務データはありません。
      </div>
    </div>
  </div>

  <script>
    const LIFF_ID = "2009367368-pyqIgDeS"; 
    const GAS_URL = "https://script.google.com/macros/s/AKfycbw3s5UuxG0BqzCBmFJ0_dvNUHCma8b0IkZerGfYiMlNbS0paSCyCv8skNSvdG0jKuYf/exec";

    let currentMemberId = "";

    function togglePeriodInput() {
      const type = document.getElementById('periodType').value;
      if (type === 'month') {
        document.getElementById('targetMonth').style.display = 'block';
        document.getElementById('targetYear').style.display = 'none';
      } else {
        document.getElementById('targetMonth').style.display = 'none';
        document.getElementById('targetYear').style.display = 'block';
      }
    }

    document.addEventListener("DOMContentLoaded", () => {
      const today = new Date();
      const yyyy = today.getFullYear();
      const mm = String(today.getMonth() + 1).padStart(2, '0');
      document.getElementById('targetMonth').value = `${yyyy}-${mm}`;

      // 年度のセレクトボックス生成（前年度〜来年度）
      const currentFiscalYear = today.getMonth() + 1 < 4 ? yyyy - 1 : yyyy;
      const yearSelect = document.getElementById('targetYear');
      for (let i = currentFiscalYear - 1; i <= currentFiscalYear + 1; i++) {
        const opt = document.createElement('option');
        opt.value = i;
        opt.innerText = i + "年度";
        if (i === currentFiscalYear) opt.selected = true;
        yearSelect.appendChild(opt);
      }

      liff.init({ liffId: LIFF_ID }).then(() => {
        if (!liff.isLoggedIn()) liff.login();
        else liff.getProfile().then(p => verifyStaffAccess(p.userId));
      });
    });

    function verifyStaffAccess(uid) {
      fetch(GAS_URL, { 
        method: "POST", headers: { "Content-Type": "text/plain" }, 
        body: JSON.stringify({ action: "verifyStaff", uid: uid }) 
      })
      .then(res => res.json()).then(data => {
        document.getElementById('loading').style.display = 'none';
        if (data.status === "success") { 
          currentMemberId = data.memberId;
          document.getElementById('displayName').innerText = data.staffName;
          document.getElementById('appContent').style.display = 'block'; 
          fetchMySalary(); // 初期表示（今月）
        } else { 
          document.getElementById('errorScreen').style.display = 'block'; 
        }
      });
    }

    // 表示のヘルパー関数
    function formatNumber(num) { return Number(num).toLocaleString(); }

    function fetchMySalary() {
      const periodType = document.getElementById('periodType').value;
      const targetPeriod = periodType === 'month' 
        ? document.getElementById('targetMonth').value 
        : document.getElementById('targetYear').value;

      if (!targetPeriod || !currentMemberId) return;

      document.getElementById('salaryCard').style.display = 'none';
      document.getElementById('noDataMsg').style.display = 'none';
      document.getElementById('calcLoading').style.display = 'block';

      fetch(GAS_URL, {
        method: "POST", headers: { "Content-Type": "text/plain" },
        body: JSON.stringify({ action: "getIndividualSalary", memberId: currentMemberId, yearMonth: targetPeriod })
      }).then(r => r.json()).then(res => {
        document.getElementById('calcLoading').style.display = 'none';
        
        if (res.status === "success" && res.data) {
          const st = res.data;
          document.getElementById('salaryCard').style.display = 'block';
          
          document.getElementById('dispTotal').innerText = `¥${formatNumber(st.totalPay)}`;

          // 現場実務 (st.genbaHours には既に "〇〇時間〇〇分" の形式が入っています)
          const genbaAmt = Math.floor(st.genbaHoursFloat * st.genbaWage);
          document.getElementById('dispGenbaCalc').innerText = `${st.genbaHours} × ${formatNumber(st.genbaWage)}円`;
          document.getElementById('dispGenbaAmt').innerText = `${formatNumber(genbaAmt)}円`;

          // 事務仕事 (st.jimuHours には既に "〇〇時間〇〇分" の形式が入っています)
          const jimuAmt = Math.floor(st.jimuHoursFloat * st.jimuWage);
          document.getElementById('dispJimuCalc').innerText = `${st.jimuHours} × ${formatNumber(st.jimuWage)}円`;
          document.getElementById('dispJimuAmt').innerText = `${formatNumber(jimuAmt)}円`;

          // 船舶手当
          const shipUnit = st.allowanceDays > 0 ? Math.floor(st.allowance / st.allowanceDays) : 0;
          document.getElementById('dispShipCalc').innerText = `${st.allowanceDays}日 × ${formatNumber(shipUnit)}円`;
          document.getElementById('dispShipAmt').innerText = `${formatNumber(st.allowance)}円`;
          
          // 打刻エラーの表示
          const errBox = document.getElementById('errorBox');
          if (st.errors && st.errors.length > 0) {
            errBox.style.display = 'block';
            errBox.innerHTML = "<b>🚨 打刻エラーがあります</b><br>" + st.errors.join("<br>") + "<br><small>※管理者に修正を依頼してください</small>";
          } else {
            errBox.style.display = 'none';
          }
        } else {
          document.getElementById('noDataMsg').style.display = 'block';
        }
      }).catch(e => {
        document.getElementById('calcLoading').style.display = 'none';
        alert("通信エラーが発生しました。");
      });
    }
  </script>
</body>
</html>
