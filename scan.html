<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>B&G 平田海洋クラブ - 受付スキャナー</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
  <style>
    body { font-family: sans-serif; background-color: #f0f2f5; margin: 0; padding: 10px; color: #333; }
    .container { max-width: 500px; margin: 0 auto; background: #fff; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    h2 { text-align: center; color: #0056b3; margin-top: 0; font-size: 20px; }
    #reader { width: 100%; border-radius: 8px; overflow: hidden; margin-bottom: 20px; background: #000; }
    #resultArea { display: none; background: #e8f4fd; padding: 15px; border-radius: 8px; border: 1px solid #b6d4fe; text-align: center; }
    .member-id { font-size: 24px; font-weight: bold; color: #0056b3; margin: 5px 0; }
    .member-name { font-size: 18px; font-weight: bold; margin-bottom: 15px; }
    button { width: 100%; padding: 15px; background-color: #06C755; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
    .status-badge { display: inline-block; padding: 5px 10px; background-color: #28a745; color: white; border-radius: 20px; font-size: 12px; font-weight: bold; margin-bottom: 10px; }
  </style>
</head>
<body>

  <div class="container">
    <h2>受付スキャナー</h2>
    <div id="reader"></div>

    <div id="resultArea">
      <div class="status-badge">読取成功</div>
      <div style="font-size: 12px; color: #666;">会員ID</div>
      <div class="member-id" id="displayId">M----</div>
      <div class="member-name" id="displayName">（データ準備中...）</div>
      <button onclick="resetScanner()">次の人をスキャンする</button>
    </div>
  </div>

  <script>
    let html5QrCode;

    // 💡【追加】読み取り成功時に「ピッ」と鳴らすための関数
    function playBeep() {
      try {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const ctx = new AudioContext();
        const osc = ctx.createOscillator();
        const gainNode = ctx.createGain();
        
        osc.type = 'sine';
        osc.frequency.setValueAtTime(1200, ctx.currentTime); // 高めの「ピッ」という音
        gainNode.gain.setValueAtTime(0.1, ctx.currentTime);  // 音量
        
        osc.connect(gainNode);
        gainNode.connect(ctx.destination);
        
        osc.start();
        osc.stop(ctx.currentTime + 0.1); // 0.1秒間だけ鳴らす
      } catch (e) {
        console.log("音声再生エラー", e);
      }
    }

    document.addEventListener("DOMContentLoaded", function() {
      html5QrCode = new Html5Qrcode("reader");
      startScanner();
    });

    function startScanner() {
      document.getElementById('resultArea').style.display = 'none';
      document.getElementById('reader').style.display = 'block';

      html5QrCode.start(
        { facingMode: "environment" }, 
        {
          fps: 15, // 💡コマ数を上げて処理を速くする
          qrbox: { width: 250, height: 250 } // 💡処理を軽くするため、読み取り枠を復活
        },
        onScanSuccess,
        onScanFailure
      ).catch(err => {
        console.error("カメラの起動に失敗しました", err);
      });
    }

    function onScanSuccess(decodedText, decodedResult) {
      if (html5QrCode.isScanning) {
        // 💡読み取った瞬間に「ピッ！」と鳴らす
        playBeep();

        html5QrCode.stop().then(() => {
          document.getElementById('reader').style.display = 'none';
          document.getElementById('resultArea').style.display = 'block';
          
          document.getElementById('displayId').innerText = decodedText;
          document.getElementById('displayName').innerText = "（機材選択機能と連動予定）";
          
          // Android用バイブレーション
          if (navigator.vibrate) navigator.vibrate(200);
        }).catch(err => {
          console.error("カメラの停止に失敗", err);
        });
      }
    }

    function onScanFailure(error) {
      // 読み取り待機中
    }

    function resetScanner() {
      startScanner();
    }
  </script>
</body>
</html>
