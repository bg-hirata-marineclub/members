<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>B&G 平田海洋クラブ - スキャナー</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
  <style>
    body { font-family: sans-serif; background-color: #f0f2f5; margin: 0; padding: 10px; color: #333; }
    .container { max-width: 500px; margin: 0 auto; background: #fff; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    h2 { text-align: center; color: #0056b3; margin-top: 0; font-size: 20px; }
    #loading, #errorScreen { text-align: center; padding: 50px 20px; color: #666; line-height: 1.6; font-weight: bold; }
    #errorScreen { display: none; color: #d9534f; }
    #appContent { display: none; }
    #reader { width: 100%; border-radius: 8px; overflow: hidden; margin-bottom: 20px; background: #000; }
    #resultArea, #successMessage { display: none; background: #fff; border-radius: 8px; text-align: center; }
    .member-id { font-size: 24px; font-weight: bold; color: #0056b3; margin: 5px 0; }
    .member-name { font-size: 22px; font-weight: bold; margin-bottom: 20px; color: #333; }
    .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
    .btn-equipment { padding: 15px 5px; background-color: #e8f4fd; color: #0056b3; border: 2px solid #b6d4fe; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; box-sizing: border-box; }
    .btn-cancel { width: 100%; padding: 15px; background-color: #6c757d; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; box-sizing: border-box; margin-top: 10px;}
    .fee-alert-box { border: 2px solid #d9534f; background: #fff3f3; padding: 15px; border-radius: 8px; margin-bottom: 20px; transition: 0.3s; }
    .fee-alert-success { border-color: #c3e6cb; background-color: #d4edda; }
    textarea.report-box { width: 100%; height: 120px; padding: 10px; border: 1px solid #ccc; border-radius: 8px; font-size: 14px; box-sizing: border-box; margin-bottom: 5px; resize: vertical; background-color: #fff;}
    textarea.report-box:focus { outline: none; border-color: #0056b3; background-color: #fff; }
    
    /* 💡 業務区分セレクトボックス用 */
    select.work-type-select { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; font-weight: bold; background-color: #fafafa; margin-bottom: 20px; }
  </style>
</head>
<body>
  <div class="container">
    <h2>受付 ＆ スキャナー</h2>
    <div id="loading">🔄 準備中...</div>
    <div id="errorScreen">⛔️ 権限がありません</div>

    <div id="appContent">
      <div id="reader"></div>

      <div id="resultArea">
        <div class="member-id" id="displayId">M----</div>
        <div class="member-name" id="displayName">お名前</div>
        <div id="feeAlertArea" class="fee-alert-box" style="display: none;"></div>
        <div id="boatSelectionArea">
          <p style="font-size: 14px; font-weight: bold; color: #555; margin-bottom: 10px;">利用する舟艇をタップ</p>
          <div class="btn-grid">
            <button class="btn-equipment" onclick="submitRecord('カヌー')">🛶 カヌー</button>
            <button class="btn-equipment" onclick="submitRecord('ペアカヌー')">🛶 ペアカヌー</button>
            <button class="btn-equipment" onclick="submitRecord('ローボート')">🚣 ローボート</button>
            <button class="btn-equipment" onclick="submitRecord('SUP')">🏄 SUP</button>
          </div>
        </div>
        <button class="btn-cancel" onclick="resetScanner()">キャンセルして戻る</button>
      </div>

      <div id="timecardSelectArea" style="display: none; text-align: left; padding: 5px;">
        <h3 style="color: #333; margin-top: 0; margin-bottom: 15px; text-align: center; border-bottom: 2px solid #e8f4fd; padding-bottom: 10px;">⏱ 勤怠の打刻</h3>
        
        <div style="background: #fff8e1; border: 1px solid #ffe082; padding: 15px; border-radius: 8px; margin-bottom: 15px;">
          <p style="font-size: 14px; font-weight: bold; color: #555; margin: 0 0 10px 0;">💻 業務区分を選択</p>
          <select id="workType" class="work-type-select">
            <option value="現場実務">🛶 現場実務（カヌー場等）</option>
            <option value="事務仕事">💻 事務仕事（リモート可）</option>
          </select>
        </div>
        
        <button style="width: 100%; padding: 20px; background-color: #0056b3; color: white; border: none; border-radius: 8px; font-size: 20px; font-weight: bold; margin-bottom: 25px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);" onclick="startGpsFlow('出勤')">☀️ 出勤する</button>

        <div style="background: #f8f9fa; padding: 15px; border-radius: 8px; border: 1px solid #ddd; margin-bottom: 15px;">
          <p style="font-size: 14px; font-weight: bold; color: #333; margin: 0 0 10px 0;">📝 業務日報・連絡事項</p>
          <textarea id="reportComment" class="report-box" placeholder="今日の出来事、リモート作業の内容など、特記事項があれば入力してください。"></textarea>
          <button style="width: 100%; padding: 15px; background-color: #ff9800; color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; margin-top: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);" onclick="startGpsFlow('退勤')">🌙 日報を記録して退勤する</button>
        </div>

        <button class="btn-cancel" onclick="resetScanner()">キャンセルして戻る</button>
      </div>

      <div id="timecardArea" style="display: none; background: #fff; border-radius: 8px; text-align: center; padding: 10px;">
        <div style="font-size: 20px; font-weight: bold; margin-bottom: 15px; color: #333;" id="tcTitle"></div>
        <div id="gpsLoading" style="color: #0056b3; font-weight: bold; margin: 15px 0;">📍 位置情報を取得中...</div>
        
        <div id="tcConfirmButtons" style="display: none;">
          <button style="width: 100%; padding: 15px; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; margin-bottom: 10px; color: white; background-color: #06C755;" onclick="executeTimecardWithShip(0)">打刻を完了する</button>
          <button class="btn-cancel" onclick="resetScanner()">キャンセル</button>
        </div>

        <div id="shipAllowanceArea" style="display: none; text-align: left;">
          <div style="background: #fff8e1; border: 1px solid #ffe082; padding: 15px; border-radius: 8px; margin-bottom: 20px;">
            <p style="font-size: 14px; font-weight: bold; color: #d9534f; margin: 0 0 10px 0;">🛥️ 本日は小型船舶を操縦しましたか？</p>
            <select id="shipSelect" style="width: 100%; padding: 12px; font-size: 16px; border-radius: 6px; border: 1px solid #ccc;">
              <option value="0">いいえ（操縦していない）</option>
              <option value="1000">はい（手当あり）</option>
            </select>
          </div>
          <button style="width: 100%; padding: 15px; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; margin-bottom: 10px; color: white; background-color: #06C755;" onclick="executeTimecardWithShip()">退勤して送信する</button>
          <button class="btn-cancel" onclick="resetScanner()">キャンセル</button>
        </div>
      </div>

      <div id="successMessage">
        <div id="successText" style="padding: 30px 10px; background: #d4edda; color: #155724; border-radius: 8px; font-size: 18px; font-weight: bold; margin-bottom: 20px;">✅ 記録しました！</div>
        <button class="btn-cancel" style="background-color: #06C755; width: 80%;" onclick="resetScanner()">スキャナーに戻る</button>
      </div>
    </div>
  </div>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbw3s5UuxG0BqzCBmFJ0_dvNUHCma8b0IkZerGfYiMlNbS0paSCyCv8skNSvdG0jKuYf/exec"; 
    let html5QrCode; let memberCache = {}; let feeCache = {}; let typeCache = {}; let priceMaster = {}; let repCache = {}; 
    let currentStaffName = ""; let currentMemberId = ""; let currentCerts = ""; 
    let pendingTimecardType = ""; let currentLat = null; let currentLng = null;

    document.addEventListener("DOMContentLoaded", () => {
      liff.init({ liffId: "2009367368-GI5IPPSf" }).then(() => { if (!liff.isLoggedIn()) liff.login(); else liff.getProfile().then(p => verifyStaffAccess(p.userId)); });
    });

    function verifyStaffAccess(uid) {
      fetch(GAS_URL, { method: "POST", headers: { "Content-Type": "text/plain" }, body: JSON.stringify({ action: "verifyStaff", uid: uid }) })
      .then(res => res.json()).then(data => {
        if (data.status === "success") { 
          currentStaffName = data.staffName; currentMemberId = data.memberId; currentCerts = data.certs || ""; 
          document.getElementById('loading').style.display = 'none'; document.getElementById('appContent').style.display = 'block'; 
          loadCache(); html5QrCode = new Html5Qrcode("reader"); startScanner(); 
        } else { document.getElementById('errorScreen').style.display = 'block'; }
      });
    }

    function loadCache(callback) {
      fetch(GAS_URL, { method: "POST", headers: { "Content-Type": "text/plain" }, body: JSON.stringify({ action: "getMembers" }) })
      .then(res => res.json()).then(data => { 
        if (data.status === "success") { memberCache = data.members; feeCache = data.feeStatuses; typeCache = data.memberTypes; priceMaster = data.feeMaster; repCache = data.repIds; if (callback) callback(); } 
      });
    }

    function startScanner() {
      document.getElementById('resultArea').style.display = 'none'; 
      document.getElementById('timecardSelectArea').style.display = 'none'; 
      document.getElementById('timecardArea').style.display = 'none'; 
      document.getElementById('successMessage').style.display = 'none'; 
      document.getElementById('reader').style.display = 'block';
      html5QrCode.start({ facingMode: "environment" }, { fps: 15, qrbox: { width: 250, height: 250 } }, onScanSuccess, () => {}).catch(e => console.error(e));
    }

    function onScanSuccess(decodedText) {
      if (!html5QrCode.isScanning) return;
      html5QrCode.stop().then(() => {
        document.getElementById('reader').style.display = 'none';
        
        if (decodedText === "TIMECARD") {
          document.getElementById('timecardSelectArea').style.display = 'block';
          return;
        }

        if (!memberCache[decodedText] && decodedText.startsWith("M")) {
          document.getElementById('loading').style.display = 'block'; document.getElementById('loading').innerText = "🔄 最新の会員データを取得中...";
          loadCache(() => { document.getElementById('loading').style.display = 'none'; processScannedMember(decodedText); });
        } else { processScannedMember(decodedText); }
      });
    }

    function processScannedMember(decodedText) {
      document.getElementById('resultArea').style.display = 'block'; document.getElementById('displayId').innerText = decodedText;
      document.getElementById('displayName').innerText = (memberCache[decodedText] || "未登録の会員").replace(' 様', '');
      
      const mType = typeCache[decodedText]; const mFeeStatus = feeCache[decodedText]; const repId = repCache[decodedText];
      
      if (mType && mType.includes("家族メンバー") && repId) {
        if (feeCache[repId] === "未入金") {
          document.getElementById('feeAlertArea').style.display = 'block'; document.getElementById('feeAlertArea').className = "fee-alert-box";
          document.getElementById('feeAlertArea').innerHTML = `<div style="color: #d9534f; font-weight: bold; font-size: 16px; margin-bottom: 10px;">⚠️ 代表者の会費が未納です</div><div style="font-size: 14px; color: #333; margin-bottom: 15px; line-height: 1.5;">家族メンバーの受付を行う前に、代表者の方のQRコードをスキャンして会費（2,000円）をお支払いください。</div><button style="width: 100%; padding: 15px; background-color: #6c757d; font-size: 16px; border: none; border-radius: 8px; font-weight: bold; color: white; cursor: pointer;" onclick="resetScanner()">スキャナーに戻る</button>`;
          document.getElementById('boatSelectionArea').style.display = 'none'; return;
        }
      }

      if (mFeeStatus === "未入金") {
        const price = priceMaster[mType] || 0;
        document.getElementById('feeAlertArea').style.display = 'block'; document.getElementById('feeAlertArea').className = "fee-alert-box";
        document.getElementById('feeAlertArea').innerHTML = `<div id="feeAlertContent"><div style="color: #d9534f; font-weight: bold; font-size: 16px; margin-bottom: 5px;">⚠️ 今年度の会費が未納です</div><div style="font-size: 24px; font-weight: bold; color: #333; margin-bottom: 10px;">請求額: <span id="feeAmountDisplay">${price.toLocaleString()}円</span></div><button id="feeBtn" style="width: 100%; padding: 15px; background-color: #06C755; font-size: 18px; border: none; border-radius: 8px; font-weight: bold; color: white; cursor: pointer; box-sizing: border-box;" onclick="executeFeeCollection()">💰 現金を受領して入金済みにする</button></div>`;
        document.getElementById('feeAlertArea').setAttribute('data-price', price); document.getElementById('boatSelectionArea').style.display = 'block'; 
      } else { document.getElementById('feeAlertArea').style.display = 'none'; document.getElementById('boatSelectionArea').style.display = 'block'; }
    }

    function resetScanner() { startScanner(); }

    function submitRecord(equipmentName) {
      document.getElementById('resultArea').style.display = 'none'; document.getElementById('successMessage').style.display = 'block'; document.getElementById('successText').innerText = "✅ 舟艇の受付を記録しました！";
      fetch(GAS_URL, { method: "POST", headers: { "Content-Type": "text/plain" }, body: JSON.stringify({ action: "recordAttendance", data: { memberId: document.getElementById('displayId').innerText, memberName: document.getElementById('displayName').innerText, equipment: equipmentName, staffName: currentStaffName } }) });
    }

    function startGpsFlow(type) {
      pendingTimecardType = type;
      
      // 💡 事務仕事の場合はGPSと船舶手当の確認をスキップして直接送信
      const workType = document.getElementById('workType').value;
      if (workType === "事務仕事") {
        currentLat = null; currentLng = null;
        executeTimecardWithShip(0); 
        return;
      }

      document.getElementById('timecardSelectArea').style.display = 'none';
      document.getElementById('timecardArea').style.display = 'block';
      document.getElementById('tcTitle').innerText = `【${type}】の確認`;
      document.getElementById('gpsLoading').style.display = 'block';
      document.getElementById('tcConfirmButtons').style.display = 'none';
      document.getElementById('shipAllowanceArea').style.display = 'none';

      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
          (position) => { currentLat = position.coords.latitude; currentLng = position.coords.longitude; showTimecardConfirm(); },
          (error) => { currentLat = null; currentLng = null; alert("位置情報の取得に失敗しました。記録は続行します。"); showTimecardConfirm(); },
          { enableHighAccuracy: true, timeout: 5000, maximumAge: 0 }
        );
      } else { currentLat = null; currentLng = null; showTimecardConfirm(); }
    }

    function showTimecardConfirm() {
      document.getElementById('gpsLoading').style.display = 'none';
      if (pendingTimecardType === "退勤" && currentCerts.includes("小型船舶")) {
        document.getElementById('shipAllowanceArea').style.display = 'block';
      } else {
        document.getElementById('tcConfirmButtons').style.display = 'block';
      }
    }

    function executeTimecardWithShip(allowanceOverride) {
      let allowanceAmount = 0;
      if (allowanceOverride !== undefined) {
        allowanceAmount = allowanceOverride;
      } else if (pendingTimecardType === "退勤" && currentCerts.includes("小型船舶")) {
        allowanceAmount = parseInt(document.getElementById('shipSelect').value) || 0;
      }
      
      const commentText = document.getElementById('reportComment') ? document.getElementById('reportComment').value : "";
      const workType = document.getElementById('workType').value;

      document.getElementById('timecardArea').style.display = 'none';
      document.getElementById('timecardSelectArea').style.display = 'none'; // 事務仕事スキップ用
      document.getElementById('successMessage').style.display = 'block';
      document.getElementById('successText').innerText = "通信中...";

      fetch(GAS_URL, {
        method: "POST", headers: { "Content-Type": "text/plain" },
        body: JSON.stringify({ 
          action: "processTimecard", 
          data: { 
            memberId: currentMemberId, staffName: currentStaffName, type: pendingTimecardType, 
            lat: currentLat, lng: currentLng, shipAllowance: allowanceAmount, comment: commentText,
            workType: workType // 💡 業務区分を追加
          }
        })
      })
      .then(res => res.json())
      .then(data => {
        if (data.status === "success") document.getElementById('successText').innerText = `✅ ${pendingTimecardType}を記録しました！\nお疲れ様でした。`;
        else document.getElementById('successText').innerText = "⚠️ エラー: " + data.message;
      }).catch(e => document.getElementById('successText').innerText = "⚠️ 通信エラー");
    }
  </script>
</body>
</html>
