<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>B&G 平田海洋クラブ - スタッフ専用ポータル</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
  <style>
    body { font-family: sans-serif; background-color: #f0f2f5; margin: 0; padding: 10px; color: #333; }
    .container { max-width: 500px; margin: 0 auto; background: #fff; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    h2 { text-align: center; color: #0056b3; margin-top: 0; font-size: 20px; }
    #loading, #errorScreen { text-align: center; padding: 50px 20px; color: #666; line-height: 1.6; }
    #errorScreen { display: none; color: #d9534f; font-weight: bold; }
    #appContent { display: none; }
    .staff-info { text-align: center; font-size: 13px; color: #0056b3; margin-bottom: 15px; font-weight: bold; background: #e8f4fd; padding: 5px; border-radius: 5px;}
    #cacheStatus { text-align: center; font-size: 12px; color: #666; margin-bottom: 10px; }
    
    #reader { width: 100%; border-radius: 8px; overflow: hidden; margin-bottom: 20px; background: #000; }
    #resultArea, #timecardArea, #successMessage { display: none; background: #fff; border-radius: 8px; text-align: center; }
    
    /* 受付結果エリア */
    .member-id { font-size: 24px; font-weight: bold; color: #0056b3; margin: 5px 0; }
    .member-name { font-size: 22px; font-weight: bold; margin-bottom: 20px; color: #333; }
    .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
    .btn-equipment { padding: 15px 5px; background-color: #e8f4fd; color: #0056b3; border: 2px solid #b6d4fe; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; }
    .btn-cancel { width: 100%; padding: 15px; background-color: #6c757d; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; }
    .status-badge { display: inline-block; padding: 5px 15px; background-color: #28a745; color: white; border-radius: 20px; font-size: 14px; font-weight: bold; margin-bottom: 10px; }
    
    /* 勤怠エリア */
    #timecardArea { padding: 20px 10px; }
    .tc-title { font-size: 20px; font-weight: bold; margin-bottom: 15px; color: #333; }
    .tc-btn { width: 100%; padding: 15px; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; margin-bottom: 10px; color: white; }
    .btn-yes { background-color: #06C755; }
    .btn-no { background-color: #6c757d; }
    #gpsLoading { display: none; color: #0056b3; font-weight: bold; margin: 15px 0; }
  </style>
</head>
<body>

  <div class="container">
    <h2>受付 ＆ 勤怠スキャナー</h2>
    <div id="loading">🔄 セキュリティチェック中...</div>
    <div id="errorScreen">⛔️ アクセス拒否<br><br><span id="errorText" style="font-size: 14px; font-weight: normal; color: #333;">この画面を開く権限がありません。</span></div>

    <div id="appContent">
      <div class="staff-info">👤 担当: <span id="displayStaffName"></span><br><span style="font-size: 11px; color: #666;" id="displayCerts"></span></div>
      <div id="cacheStatus">🔄 名簿データを準備中...</div>
      
      <div id="reader"></div>

      <div id="resultArea">
        <div class="status-badge">読取成功</div>
        <div class="member-id" id="displayId">M----</div>
        <div class="member-name" id="displayName">お名前</div>
        
        <div id="feeAlertArea" style="display: none; background: #fff3f3; border: 2px solid #d9534f; padding: 15px; border-radius: 8px; margin-bottom: 20px;">
          <div style="color: #d9534f; font-weight: bold; font-size: 16px; margin-bottom: 10px;">⚠️ 今年度の会費が未納です</div>
          <button class="btn-yes" style="width: 100%; padding: 12px; font-size: 16px; border: none; border-radius: 8px; font-weight: bold; color: white; cursor: pointer;" onclick="executeFeeCollection()">💰 現金を受領して入金済みにする</button>
        </div>
        
        <p style="font-size: 14px; font-weight: bold; color: #555; margin-bottom: 10px;">利用する舟艇をタップ</p>
        <div class="btn-grid">
          <button class="btn-equipment" onclick="submitRecord('カヌー')">🛶 カヌー</button>
          <button class="btn-equipment" onclick="submitRecord('ペアカヌー')">🛶 ペアカヌー</button>
          <button class="btn-equipment" onclick="submitRecord('ローボート')">🚣 ローボート</button>
          <button class="btn-equipment" onclick="submitRecord('SUP')">🏄 SUP</button>
          <button class="btn-equipment" onclick="submitRecord('その他')" style="grid-column: span 2;">その他の利用</button>
        </div>
        <button class="btn-cancel" onclick="resetScanner()">キャンセルして戻る</button>
      </div>

      <div id="timecardArea">
        <div class="tc-title" id="tcTitle">出勤を記録しますか？</div>
        <div id="gpsLoading">📍 位置情報を取得中...</div>
        
        <div id="tcConfirmButtons">
          <button class="tc-btn btn-yes" onclick="executeTimecard()">はい、打刻する</button>
          <button class="tc-btn btn-no" onclick="resetScanner()">キャンセル</button>
        </div>

        <div id="shipAllowanceArea" style="display: none; margin-top: 20px; padding-top: 20px; border-top: 1px dashed #ccc;">
          <p style="font-size: 16px; font-weight: bold; color: #d9534f; margin-bottom: 15px;">🛥️ 本日は小型船舶を操縦しましたか？</p>
          <button class="tc-btn btn-yes" onclick="executeTimecardWithShip(1000)">はい（手当あり）</button>
          <button class="tc-btn btn-no" onclick="executeTimecardWithShip(0)">いいえ</button>
          <button class="btn-cancel" style="margin-top: 15px;" onclick="resetScanner()">キャンセル</button>
        </div>
      </div>

      <div id="successMessage">
        <div id="successText" style="padding: 30px 10px; background: #d4edda; color: #155724; border-radius: 8px; border: 1px solid #c3e6cb; font-size: 18px; font-weight: bold; margin-bottom: 20px;">✅ 記録しました！</div>
        <button class="btn-cancel" style="background-color: #06C755; width: 80%;" onclick="resetScanner()">スキャナーに戻る</button>
      </div>
    </div>
  </div>

  <script>
    const LIFF_ID = "2009367368-GI5IPPSf"; 
    const GAS_URL = "https://script.google.com/macros/s/AKfycbw3s5UuxG0BqzCBmFJ0_dvNUHCma8b0IkZerGfYiMlNbS0paSCyCv8skNSvdG0jKuYf/exec"; 

    let html5QrCode;
    let memberCache = {}; 
    let feeCache = {}; // 💡【追加】会費の入金状況を保持する変数
    let currentStaffName = "";
    let currentCerts = "";
    
    // 勤怠用の一時変数
    let pendingTimecardType = ""; 
    let currentLat = null;
    let currentLng = null;

    document.addEventListener("DOMContentLoaded", initializeApp);

    function initializeApp() {
      liff.init({ liffId: LIFF_ID })
        .then(() => {
          if (!liff.isLoggedIn()) liff.login();
          else liff.getProfile().then(profile => verifyStaffAccess(profile.userId)).catch(e => showError("プロフィールの取得失敗"));
        }).catch(e => showError("LIFF初期化エラー"));
    }

    function verifyStaffAccess(uid) {
      fetch(GAS_URL, { method: "POST", headers: { "Content-Type": "text/plain" }, body: JSON.stringify({ action: "verifyStaff", uid: uid }) })
      .then(res => res.json()).then(data => {
        if (data.status === "success") {
          currentStaffName = data.staffName;
          currentCerts = data.certs || "";
          document.getElementById('displayStaffName').innerText = currentStaffName;
          if (currentCerts) document.getElementById('displayCerts').innerText = "資格: " + currentCerts;
          
          document.getElementById('loading').style.display = 'none';
          document.getElementById('appContent').style.display = 'block';
          
          loadCache(); 
          html5QrCode = new Html5Qrcode("reader");
          startScanner();
        } else showError(data.message);
      }).catch(e => showError("通信エラー"));
    }

    function showError(msg) {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('errorScreen').style.display = 'block';
      document.getElementById('errorText').innerText = msg;
    }

    function playBeep() {
      try { const ctx = new (window.AudioContext || window.webkitAudioContext)(); const osc = ctx.createOscillator(); const gainNode = ctx.createGain(); osc.type = 'sine'; osc.frequency.setValueAtTime(1200, ctx.currentTime); gainNode.gain.setValueAtTime(0.1, ctx.currentTime); osc.connect(gainNode); gainNode.connect(ctx.destination); osc.start(); osc.stop(ctx.currentTime + 0.1); } catch (e) {}
    }

    // 💡【修正】名簿データの読み込み時に会費状況も取得
    function loadCache() {
      fetch(GAS_URL, { method: "POST", headers: { "Content-Type": "text/plain" }, body: JSON.stringify({ action: "getMembers" }) })
      .then(res => res.json()).then(data => {
        if (data.status === "success") { 
          memberCache = data.members; 
          feeCache = data.feeStatuses || {}; // 💡追加
          document.getElementById('cacheStatus').innerText = "✅ 準備完了"; 
        }
      }).catch(err => document.getElementById('cacheStatus').innerText = "⚠️ 通信エラー");
    }

    function startScanner() {
      document.getElementById('resultArea').style.display = 'none';
      document.getElementById('timecardArea').style.display = 'none';
      document.getElementById('successMessage').style.display = 'none';
      document.getElementById('reader').style.display = 'block';
      document.getElementById('shipAllowanceArea').style.display = 'none';
      document.getElementById('tcConfirmButtons').style.display = 'block';

      html5QrCode.start({ facingMode: "environment" }, { fps: 15, qrbox: { width: 250, height: 250 } }, onScanSuccess, () => {}).catch(e => console.error(e));
    }

    // 💡【修正】QR読み取り成功時の処理
    function onScanSuccess(decodedText, decodedResult) {
      if (!html5QrCode.isScanning) return;
      playBeep();
      
      html5QrCode.stop().then(() => {
        document.getElementById('reader').style.display = 'none';
        
        if (decodedText === "CLOCK_IN" || decodedText === "CLOCK_OUT") {
          pendingTimecardType = (decodedText === "CLOCK_IN") ? "出勤" : "退勤";
          processTimecardFlow();
          return;
        }
        
        document.getElementById('resultArea').style.display = 'block';
        document.getElementById('displayId').innerText = decodedText;
        const name = memberCache[decodedText] || "未登録の会員";
        document.getElementById('displayName').innerText = name.replace(' 様', '');
        
        // 💡【追加】会費状況のチェック
        if (feeCache[decodedText] === "未入金") {
          document.getElementById('feeAlertArea').style.display = 'block';
        } else {
          document.getElementById('feeAlertArea').style.display = 'none';
        }

        if (navigator.vibrate) navigator.vibrate(200);
      });
    }

    function resetScanner() { startScanner(); }

    // --- 勤怠打刻フロー ---
    function processTimecardFlow() {
      document.getElementById('timecardArea').style.display = 'block';
      document.getElementById('tcTitle').innerText = `【${pendingTimecardType}】を記録します。`;
      document.getElementById('gpsLoading').style.display = 'block';
      document.getElementById('tcConfirmButtons').style.display = 'none';

      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
          (position) => {
            currentLat = position.coords.latitude; currentLng = position.coords.longitude;
            showTimecardConfirm();
          },
          (error) => {
            currentLat = null; currentLng = null;
            alert("位置情報の取得に失敗しました。記録は続行します。");
            showTimecardConfirm();
          },
          { enableHighAccuracy: true, timeout: 5000, maximumAge: 0 }
        );
      } else {
        currentLat = null; currentLng = null; showTimecardConfirm();
      }
    }

    function showTimecardConfirm() {
      document.getElementById('gpsLoading').style.display = 'none';
      if (pendingTimecardType === "退勤" && currentCerts.includes("小型船舶")) {
        document.getElementById('tcTitle').innerText = "退勤処理に進みます。";
        document.getElementById('shipAllowanceArea').style.display = 'block';
      } else {
        document.getElementById('tcConfirmButtons').style.display = 'block';
      }
    }

    function executeTimecard() {
      executeTimecardWithShip(0);
    }

    function executeTimecardWithShip(allowanceAmount) {
      document.getElementById('timecardArea').style.display = 'none';
      document.getElementById('successMessage').style.display = 'block';
      document.getElementById('successText').innerText = "通信中...";

      fetch(GAS_URL, {
        method: "POST", headers: { "Content-Type": "text/plain" },
        body: JSON.stringify({ 
          action: "processTimecard", 
          data: { 
            staffName: currentStaffName, 
            type: pendingTimecardType,
            lat: currentLat,
            lng: currentLng,
            shipAllowance: allowanceAmount
          }
        })
      })
      .then(res => res.json())
      .then(data => {
        if (data.status === "success") document.getElementById('successText').innerText = `✅ ${pendingTimecardType}を記録しました！`;
        else document.getElementById('successText').innerText = "⚠️ エラー: " + data.message;
      }).catch(e => document.getElementById('successText').innerText = "⚠️ 通信エラー");
    }

    // --- 通常のメンバー受付フロー ---
    function submitRecord(equipmentName) {
      const memberId = document.getElementById('displayId').innerText;
      const memberName = document.getElementById('displayName').innerText;
      document.getElementById('resultArea').style.display = 'none';
      document.getElementById('successMessage').style.display = 'block';
      document.getElementById('successText').innerText = "✅ 受付を記録しました！";

      fetch(GAS_URL, {
        method: "POST", headers: { "Content-Type": "text/plain" },
        body: JSON.stringify({ 
          action: "recordAttendance", 
          data: { memberId: memberId, memberName: memberName, equipment: equipmentName, staffName: currentStaffName }
        })
      }).catch(e => console.error("エラー", e));
    }

    // 💡【新規追加】集金処理を実行する関数
    function executeFeeCollection() {
      let amount = prompt("受領した金額を入力してください（半角数字）\n例: 3000", "");
      if (amount === null) return; // キャンセル時
      if (!amount.match(/^[0-9]+$/)) { alert("金額は半角数字で入力してください。"); return; }

      if (!confirm(`【${amount}円】を受領しましたか？\nシステムを入金済みに更新します。`)) return;

      const memberId = document.getElementById('displayId').innerText;
      const memberName = document.getElementById('displayName').innerText;

      document.getElementById('resultArea').style.display = 'none';
      document.getElementById('successMessage').style.display = 'block';
      document.getElementById('successText').innerText = "⏳ 入金処理中...";

      fetch(GAS_URL, {
        method: "POST", headers: { "Content-Type": "text/plain" },
        body: JSON.stringify({ 
          action: "processFeeCollection", 
          data: { memberId: memberId, memberName: memberName, staffName: currentStaffName, amount: amount } 
        })
      })
      .then(res => res.json())
      .then(data => {
        if (data.status === "success") { 
          document.getElementById('successText').innerText = "✅ 入金処理が完了しました！\n（続けて舟艇の受付を行ってください）";
          feeCache[memberId] = "入金済"; // ローカルのキャッシュも更新
        } else { 
          document.getElementById('successText').innerText = "⚠️ エラー: " + data.message; 
        }
      }).catch(e => document.getElementById('successText').innerText = "⚠️ 通信エラー");
    }
  </script>
</body>
</html>
