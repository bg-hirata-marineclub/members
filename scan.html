<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>B&G 平田海洋クラブ - スキャナー</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
  <style>
    body { font-family: sans-serif; background-color: #f0f2f5; margin: 0; padding: 10px; color: #333; }
    .container { max-width: 500px; margin: 0 auto; background: #fff; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    h2 { text-align: center; color: #0056b3; margin-top: 0; font-size: 20px; }
    #loading, #errorScreen { text-align: center; padding: 50px 20px; color: #666; line-height: 1.6; font-weight: bold; }
    #errorScreen { display: none; color: #d9534f; }
    #appContent { display: none; }
    #reader { width: 100%; border-radius: 8px; overflow: hidden; margin-bottom: 20px; background: #000; }
    #resultArea, #successMessage { display: none; background: #fff; border-radius: 8px; text-align: center; }
    .member-id { font-size: 24px; font-weight: bold; color: #0056b3; margin: 5px 0; }
    .member-name { font-size: 22px; font-weight: bold; margin-bottom: 20px; color: #333; }
    .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
    .btn-equipment { padding: 15px 5px; background-color: #e8f4fd; color: #0056b3; border: 2px solid #b6d4fe; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; box-sizing: border-box; }
    .btn-cancel { width: 100%; padding: 15px; background-color: #6c757d; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; box-sizing: border-box; }
    
    .fee-alert-box { border: 2px solid #d9534f; background: #fff3f3; padding: 15px; border-radius: 8px; margin-bottom: 20px; transition: 0.3s; }
    .fee-alert-success { border-color: #c3e6cb; background-color: #d4edda; }
  </style>
</head>
<body>
  <div class="container">
    <h2>受付 ＆ スキャナー</h2>
    <div id="loading">🔄 準備中...</div>
    <div id="errorScreen">⛔️ 権限がありません</div>

    <div id="appContent">
      <div id="reader"></div>

      <div id="resultArea">
        <div class="member-id" id="displayId">M----</div>
        <div class="member-name" id="displayName">お名前</div>
        
        <div id="feeAlertArea" class="fee-alert-box" style="display: none;"></div>
        
        <div id="boatSelectionArea">
          <p style="font-size: 14px; font-weight: bold; color: #555; margin-bottom: 10px;">利用する舟艇をタップ</p>
          <div class="btn-grid">
            <button class="btn-equipment" onclick="submitRecord('カヌー')">🛶 カヌー</button>
            <button class="btn-equipment" onclick="submitRecord('ペアカヌー')">🛶 ペアカヌー</button>
            <button class="btn-equipment" onclick="submitRecord('ローボート')">🚣 ローボート</button>
            <button class="btn-equipment" onclick="submitRecord('SUP')">🏄 SUP</button>
          </div>
        </div>
        
        <button class="btn-cancel" onclick="resetScanner()">キャンセルして戻る</button>
      </div>

      <div id="successMessage">
        <div id="successText" style="padding: 30px 10px; background: #d4edda; color: #155724; border-radius: 8px; font-size: 18px; font-weight: bold; margin-bottom: 20px;">✅ 舟艇の受付を記録しました！</div>
        <button class="btn-cancel" style="background-color: #06C755; width: 80%;" onclick="resetScanner()">スキャナーに戻る</button>
      </div>
    </div>
  </div>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbw3s5UuxG0BqzCBmFJ0_dvNUHCma8b0IkZerGfYiMlNbS0paSCyCv8skNSvdG0jKuYf/exec"; 
    let html5QrCode; let memberCache = {}; let feeCache = {}; let typeCache = {}; let priceMaster = {}; let repCache = {}; let currentStaffName = "";

    document.addEventListener("DOMContentLoaded", () => {
      liff.init({ liffId: "2009367368-GI5IPPSf" }).then(() => { if (!liff.isLoggedIn()) liff.login(); else liff.getProfile().then(p => verifyStaffAccess(p.userId)); });
    });

    function verifyStaffAccess(uid) {
      fetch(GAS_URL, { method: "POST", headers: { "Content-Type": "text/plain" }, body: JSON.stringify({ action: "verifyStaff", uid: uid }) })
      .then(res => res.json()).then(data => {
        if (data.status === "success") { currentStaffName = data.staffName; document.getElementById('loading').style.display = 'none'; document.getElementById('appContent').style.display = 'block'; loadCache(); html5QrCode = new Html5Qrcode("reader"); startScanner(); } else document.getElementById('errorScreen').style.display = 'block';
      });
    }

    function loadCache(callback) {
      fetch(GAS_URL, { method: "POST", headers: { "Content-Type": "text/plain" }, body: JSON.stringify({ action: "getMembers" }) })
      .then(res => res.json()).then(data => { 
        if (data.status === "success") { 
          memberCache = data.members; feeCache = data.feeStatuses; typeCache = data.memberTypes; priceMaster = data.feeMaster; repCache = data.repIds;
          if (callback) callback();
        } 
      });
    }

    function startScanner() {
      document.getElementById('resultArea').style.display = 'none'; document.getElementById('successMessage').style.display = 'none'; document.getElementById('reader').style.display = 'block';
      html5QrCode.start({ facingMode: "environment" }, { fps: 15, qrbox: { width: 250, height: 250 } }, onScanSuccess, () => {}).catch(e => console.error(e));
    }

    function onScanSuccess(decodedText) {
      if (!html5QrCode.isScanning) return;
      html5QrCode.stop().then(() => {
        document.getElementById('reader').style.display = 'none';
        
        // 💡修正: キャッシュにない場合は最新データを取り直す
        if (!memberCache[decodedText] && decodedText.startsWith("M")) {
          document.getElementById('loading').style.display = 'block';
          document.getElementById('loading').innerText = "🔄 最新の会員データを取得中...";
          
          loadCache(() => {
            document.getElementById('loading').style.display = 'none';
            processScannedMember(decodedText);
          });
        } else {
          processScannedMember(decodedText);
        }
      });
    }

    // 💡修正: 読み取り後の処理（親ブロック機能を追加）
    function processScannedMember(decodedText) {
      document.getElementById('resultArea').style.display = 'block';
      document.getElementById('displayId').innerText = decodedText;
      document.getElementById('displayName').innerText = (memberCache[decodedText] || "未登録の会員").replace(' 様', '');
      
      const mType = typeCache[decodedText];
      const mFeeStatus = feeCache[decodedText];
      const repId = repCache[decodedText];
      
      // 💡【追加】親ブロック機能: 家族メンバーで、かつ代表者が未入金の場合
      if (mType && mType.includes("家族メンバー") && repId) {
        if (feeCache[repId] === "未入金") {
          document.getElementById('feeAlertArea').style.display = 'block';
          document.getElementById('feeAlertArea').className = "fee-alert-box";
          document.getElementById('feeAlertArea').innerHTML = `
            <div style="color: #d9534f; font-weight: bold; font-size: 16px; margin-bottom: 10px;">⚠️ 代表者の会費が未納です</div>
            <div style="font-size: 14px; color: #333; margin-bottom: 15px; line-height: 1.5;">家族メンバーの受付を行う前に、代表者の方のQRコードをスキャンして会費（2,000円）をお支払いください。</div>
            <button style="width: 100%; padding: 15px; background-color: #6c757d; font-size: 16px; border: none; border-radius: 8px; font-weight: bold; color: white; cursor: pointer;" onclick="resetScanner()">スキャナーに戻る</button>
          `;
          document.getElementById('boatSelectionArea').style.display = 'none'; // 舟艇選択を隠して受付ブロック
          return;
        }
      }

      // 通常の未入金アラート（自身が未入金の場合）
      if (mFeeStatus === "未入金") {
        const price = priceMaster[mType] || 0;
        document.getElementById('feeAlertArea').style.display = 'block';
        document.getElementById('feeAlertArea').className = "fee-alert-box";
        document.getElementById('feeAlertArea').innerHTML = `
          <div id="feeAlertContent">
            <div style="color: #d9534f; font-weight: bold; font-size: 16px; margin-bottom: 5px;">⚠️ 今年度の会費が未納です</div>
            <div style="font-size: 24px; font-weight: bold; color: #333; margin-bottom: 10px;">請求額: <span id="feeAmountDisplay">${price.toLocaleString()}円</span></div>
            <button id="feeBtn" style="width: 100%; padding: 15px; background-color: #06C755; font-size: 18px; border: none; border-radius: 8px; font-weight: bold; color: white; cursor: pointer; box-sizing: border-box;" onclick="executeFeeCollection()">💰 現金を受領して入金済みにする</button>
          </div>`;
        document.getElementById('feeAlertArea').setAttribute('data-price', price);
        document.getElementById('boatSelectionArea').style.display = 'block'; 
      } else {
        document.getElementById('feeAlertArea').style.display = 'none';
        document.getElementById('boatSelectionArea').style.display = 'block';
      }
    }

    function resetScanner() { startScanner(); }

    function submitRecord(equipmentName) {
      document.getElementById('resultArea').style.display = 'none'; document.getElementById('successMessage').style.display = 'block';
      fetch(GAS_URL, { method: "POST", headers: { "Content-Type": "text/plain" }, body: JSON.stringify({ action: "recordAttendance", data: { memberId: document.getElementById('displayId').innerText, memberName: document.getElementById('displayName').innerText, equipment: equipmentName, staffName: currentStaffName } }) });
    }

    function executeFeeCollection() {
      const price = document.getElementById('feeAlertArea').getAttribute('data-price');
      if (!confirm(`【${price}円】を受領し、システムを入金済みに更新しますか？`)) return;

      const memId = document.getElementById('displayId').innerText;
      const btn = document.getElementById('feeBtn');
      btn.innerText = "⏳ 入金処理中..."; btn.disabled = true;

      fetch(GAS_URL, { method: "POST", headers: { "Content-Type": "text/plain" }, body: JSON.stringify({ action: "processFeeCollection", data: { memberId: memId, memberName: document.getElementById('displayName').innerText, staffName: currentStaffName, amount: price } }) })
      .then(res => res.json()).then(data => {
        if (data.status === "success") { 
          feeCache[memId] = "入金済"; 
          const alertBox = document.getElementById('feeAlertArea');
          alertBox.className = "fee-alert-box fee-alert-success";
          alertBox.innerHTML = '<div style="color: #155724; font-weight: bold; font-size: 16px; text-align: center;">✅ 入金処理が完了しました！<br>続けて下のボタンから舟艇を選択してください。</div>';
        } 
        else { alert("⚠️ エラー: " + data.message); btn.innerText = "💰 現金を受領して入金済みにする"; btn.disabled = false; }
      });
    }
  </script>
</body>
</html>
