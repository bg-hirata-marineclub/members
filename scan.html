<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>B&G 平田海洋クラブ - 受付スキャナー</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
  <style>
    body { font-family: sans-serif; background-color: #f0f2f5; margin: 0; padding: 10px; color: #333; }
    .container { max-width: 500px; margin: 0 auto; background: #fff; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    h2 { text-align: center; color: #0056b3; margin-top: 0; font-size: 20px; }
    
    /* セキュリティチェック画面 */
    #loading, #errorScreen { text-align: center; padding: 50px 20px; color: #666; line-height: 1.6; }
    #errorScreen { display: none; color: #d9534f; font-weight: bold; }
    
    /* アプリ本体画面（初期は非表示） */
    #appContent { display: none; }
    
    #cacheStatus { text-align: center; font-size: 12px; color: #666; margin-bottom: 10px; }
    .staff-info { text-align: center; font-size: 13px; color: #0056b3; margin-bottom: 15px; font-weight: bold; background: #e8f4fd; padding: 5px; border-radius: 5px;}
    
    #reader { width: 100%; border-radius: 8px; overflow: hidden; margin-bottom: 20px; background: #000; }
    #resultArea { display: none; background: #fff; border-radius: 8px; text-align: center; }
    .member-id { font-size: 24px; font-weight: bold; color: #0056b3; margin: 5px 0; }
    .member-name { font-size: 22px; font-weight: bold; margin-bottom: 20px; color: #333; }
    
    .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
    .btn-equipment { padding: 15px 5px; background-color: #e8f4fd; color: #0056b3; border: 2px solid #b6d4fe; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; }
    .btn-equipment:active { background-color: #b6d4fe; }
    
    .btn-cancel { width: 100%; padding: 15px; background-color: #6c757d; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; }
    .status-badge { display: inline-block; padding: 5px 15px; background-color: #28a745; color: white; border-radius: 20px; font-size: 14px; font-weight: bold; margin-bottom: 10px; }
    
    #successMessage { display: none; padding: 30px 10px; background: #d4edda; color: #155724; border-radius: 8px; border: 1px solid #c3e6cb; font-size: 18px; font-weight: bold; text-align: center; margin-bottom: 20px;}
  </style>
</head>
<body>

  <div class="container">
    <h2>受付スキャナー</h2>
    
    <div id="loading">🔄 セキュリティチェック中...<br><span style="font-size: 12px;">スタッフ権限を確認しています</span></div>
    
    <div id="errorScreen">
      ⛔️ アクセス拒否<br><br>
      <span id="errorText" style="font-size: 14px; font-weight: normal; color: #333;">この画面を開く権限がありません。</span>
    </div>

    <div id="appContent">
      <div class="staff-info">👤 受付担当: <span id="displayStaffName"></span></div>
      <div id="cacheStatus">🔄 名簿データを準備中...</div>
      
      <div id="reader"></div>

      <div id="resultArea">
        <div class="status-badge">読取成功</div>
        <div style="font-size: 13px; color: #666;">会員ID</div>
        <div class="member-id" id="displayId">M----</div>
        <div class="member-name" id="displayName">お名前</div>
        
        <p style="font-size: 14px; font-weight: bold; color: #555; margin-bottom: 10px;">利用する舟艇をタップ</p>
        
        <div class="btn-grid">
          <button class="btn-equipment" onclick="submitRecord('カヌー')">🛶 カヌー</button>
          <button class="btn-equipment" onclick="submitRecord('ペアカヌー')">🛶 ペアカヌー</button>
          <button class="btn-equipment" onclick="submitRecord('ローボート')">🚣 ローボート</button>
          <button class="btn-equipment" onclick="submitRecord('SUP')">🏄 SUP</button>
          <button class="btn-equipment" onclick="submitRecord('その他')" style="grid-column: span 2;">その他の利用</button>
        </div>
        
        <button class="btn-cancel" onclick="resetScanner()">キャンセルして戻る</button>
      </div>

      <div id="successMessage">
        ✅ 受付を記録しました！<br><br>
        <button class="btn-cancel" style="background-color: #06C755; width: 80%;" onclick="resetScanner()">次の人をスキャン</button>
      </div>
    </div>
  </div>

  <script>
    // 💡【重要】ステップ1で取得した新しいLIFF IDをここに貼ってください！
    const LIFF_ID = "2009367368-GI5IPPSf"; 
    const GAS_URL = "https://script.google.com/macros/s/AKfycbw3s5UuxG0BqzCBmFJ0_dvNUHCma8b0IkZerGfYiMlNbS0paSCyCv8skNSvdG0jKuYf/exec"; 

    let html5QrCode;
    let memberCache = {}; 
    let currentStaffName = "";

    document.addEventListener("DOMContentLoaded", initializeApp);

    // 💡ステップ1：LIFFの初期化とログイン
    function initializeApp() {
      liff.init({ liffId: LIFF_ID })
        .then(() => {
          if (!liff.isLoggedIn()) {
            liff.login();
          } else {
            liff.getProfile().then(profile => {
              verifyStaffAccess(profile.userId);
            }).catch(err => showError("プロフィールの取得に失敗しました。"));
          }
        })
        .catch(err => showError("LIFFの初期化に失敗しました。LINEアプリから開いてください。"));
    }

    // 💡ステップ2：GASに問い合わせて「権限」をチェック
    function verifyStaffAccess(uid) {
      fetch(GAS_URL, {
        method: "POST", headers: { "Content-Type": "text/plain" },
        body: JSON.stringify({ action: "verifyStaff", uid: uid })
      })
      .then(res => res.json())
      .then(data => {
        if (data.status === "success") {
          currentStaffName = data.staffName;
          document.getElementById('displayStaffName').innerText = currentStaffName;
          
          // 権限OKなら画面を表示してスキャナー起動
          document.getElementById('loading').style.display = 'none';
          document.getElementById('appContent').style.display = 'block';
          
          loadCache(); 
          html5QrCode = new Html5Qrcode("reader");
          startScanner();
        } else {
          showError(data.message); // 権限NGなら弾く
        }
      })
      .catch(e => showError("通信エラーが発生しました。"));
    }

    function showError(msg) {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('errorScreen').style.display = 'block';
      document.getElementById('errorText').innerText = msg;
    }

    // --- 以降は元のスキャナー機能 ---

    function playBeep() {
      try {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const ctx = new AudioContext(); const osc = ctx.createOscillator(); const gainNode = ctx.createGain();
        osc.type = 'sine'; osc.frequency.setValueAtTime(1200, ctx.currentTime); gainNode.gain.setValueAtTime(0.1, ctx.currentTime);
        osc.connect(gainNode); gainNode.connect(ctx.destination); osc.start(); osc.stop(ctx.currentTime + 0.1);
      } catch (e) {}
    }

    function loadCache() {
      fetch(GAS_URL, { method: "POST", headers: { "Content-Type": "text/plain" }, body: JSON.stringify({ action: "getMembers" }) })
      .then(res => res.json()).then(data => {
        if (data.status === "success") {
          memberCache = data.members;
          document.getElementById('cacheStatus').innerText = "✅ 名簿データ準備完了 (" + Object.keys(memberCache).length + "件)";
        } else document.getElementById('cacheStatus').innerText = "⚠️ 名簿の取得に失敗しました";
      }).catch(err => document.getElementById('cacheStatus').innerText = "⚠️ 通信エラー");
    }

    function startScanner() {
      document.getElementById('resultArea').style.display = 'none';
      document.getElementById('successMessage').style.display = 'none';
      document.getElementById('reader').style.display = 'block';

      html5QrCode.start(
        { facingMode: "environment" }, { fps: 15, qrbox: { width: 250, height: 250 } }, onScanSuccess, onScanFailure
      ).catch(err => console.error(err));
    }

    function onScanSuccess(decodedText, decodedResult) {
      if (html5QrCode.isScanning) {
        playBeep();
        html5QrCode.stop().then(() => {
          document.getElementById('reader').style.display = 'none';
          document.getElementById('resultArea').style.display = 'block';
          document.getElementById('displayId').innerText = decodedText;
          const name = memberCache[decodedText] || "未登録の会員（または新規）";
          document.getElementById('displayName').innerText = name.replace(' 様', ''); // 様を消す処理
          if (navigator.vibrate) navigator.vibrate(200);
        });
      }
    }
    
    function onScanFailure(error) {}
    function resetScanner() { startScanner(); }

    function submitRecord(equipmentName) {
      const memberId = document.getElementById('displayId').innerText;
      const memberName = document.getElementById('displayName').innerText;

      document.getElementById('resultArea').style.display = 'none';
      document.getElementById('successMessage').style.display = 'block';

      fetch(GAS_URL, {
        method: "POST", headers: { "Content-Type": "text/plain" },
        body: JSON.stringify({ 
          action: "recordAttendance", 
          data: { 
            memberId: memberId, 
            memberName: memberName, 
            equipment: equipmentName,
            staffName: currentStaffName // 💡ここに追加：担当者名を一緒に送信！
          }
        })
      }).catch(err => console.error("記録送信エラー", err));
    }
  </script>
</body>
</html>
