<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>B&G 平田海洋クラブ - タイムカード</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    body { font-family: sans-serif; background-color: #f0f2f5; padding: 20px; margin: 0; color: #333; text-align: center; }
    .container { max-width: 400px; margin: 0 auto; background: #fff; padding: 30px 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    h2 { margin-top: 0; color: #0056b3; font-size: 24px; margin-bottom: 20px; }
    .staff-info { font-size: 18px; font-weight: bold; margin-bottom: 20px; color: #444; background: #e8f4fd; padding: 10px; border-radius: 8px; }
    
    .work-type-selector { margin-bottom: 20px; text-align: left; }
    .work-type-selector label { font-weight: bold; color: #555; display: block; margin-bottom: 8px; font-size: 14px; }
    select { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; font-weight: bold; background-color: #fafafa; }
    
    .btn { display: block; width: 100%; padding: 20px; margin-bottom: 15px; border: none; border-radius: 10px; font-size: 22px; font-weight: bold; color: #fff; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    .btn-in { background-color: #06C755; }
    .btn-out { background-color: #d9534f; }
    .btn:disabled { background-color: #ccc; cursor: not-allowed; }
    
    .comment-area { margin-top: 20px; text-align: left; }
    .comment-area label { font-weight: bold; color: #555; display: block; margin-bottom: 5px; font-size: 14px; }
    textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; background-color: #fafafa; }
    
    #loading, #errorScreen, #successScreen { display: none; padding: 30px 10px; }
    #errorScreen { color: #d9534f; font-weight: bold; }
  </style>
</head>
<body>

  <div class="container" id="mainScreen">
    <h2>⏱ タイムカード</h2>
    <div class="staff-info">👤 <span id="staffName">読込中...</span></div>

    <div class="work-type-selector">
      <label>💻 業務区分</label>
      <select id="workType">
        <option value="現場実務">現場実務（カヌー場等）</option>
        <option value="事務仕事">事務仕事（リモート可）</option>
      </select>
    </div>

    <button id="btnIn" class="btn btn-in" onclick="stamp('出勤')" disabled>出勤</button>
    <button id="btnOut" class="btn btn-out" onclick="stamp('退勤')" disabled>退勤</button>

    <div class="comment-area">
      <label>📝 業務メモ（退勤時に入力）</label>
      <textarea id="comment" rows="3" placeholder="事務作業の内容などを入力してください"></textarea>
    </div>
  </div>

  <div id="loading">📍 データを送信しています...</div>

  <div id="successScreen">
    <div style="font-size: 60px; margin-bottom: 10px;">✅</div>
    <h2 style="color: #28a745;">打刻完了</h2>
    <p><span id="resultType"></span>: <span id="resultTime"></span></p>
  </div>

  <div id="errorScreen">
    <div style="font-size: 50px; margin-bottom: 10px;">⛔️</div>
    <p id="errorText"></p>
    <button onclick="location.reload()" style="padding: 10px 20px; margin-top: 15px;">再試行</button>
  </div>

  <script>
    const LIFF_ID = "YOUR_LIFF_ID_HERE"; // 💡 スタッフ用のLIFF IDを設定してください
    const GAS_URL = "https://script.google.com/macros/s/AKfycbw3s5UuxG0BqzCBmFJ0_dvNUHCma8b0IkZerGfYiMlNbS0paSCyCv8skNSvdG0jKuYf/exec";

    let currentUser = { id: "", name: "" };

    document.addEventListener("DOMContentLoaded", () => {
      liff.init({ liffId: LIFF_ID }).then(() => {
        if (!liff.isLoggedIn()) {
          const urlParams = new URLSearchParams(window.location.search);
          if (urlParams.get('staff')) {
            currentUser = { id: "M9999", name: urlParams.get('staff') };
            document.getElementById('staffName').innerText = currentUser.name;
            enableButtons();
          }
        } else {
          liff.getProfile().then(p => {
            fetch(GAS_URL, { 
              method: "POST", headers: { "Content-Type": "text/plain" }, 
              body: JSON.stringify({ action: "verifyStaff", uid: p.userId }) 
            }).then(r => r.json()).then(data => {
              if (data.status === "success") {
                currentUser = { id: data.memberId, name: data.staffName };
                document.getElementById('staffName').innerText = currentUser.name;
                enableButtons();
              } else {
                showError("スタッフ権限がありません。");
              }
            });
          });
        }
      });
    });

    function enableButtons() {
      document.getElementById('btnIn').disabled = false;
      document.getElementById('btnOut').disabled = false;
    }

    function showError(msg) {
      document.getElementById('mainScreen').style.display = 'none';
      document.getElementById('loading').style.display = 'none';
      document.getElementById('errorScreen').style.display = 'block';
      document.getElementById('errorText').innerText = msg;
    }

    function stamp(type) {
      const workType = document.getElementById('workType').value;
      const comment = document.getElementById('comment').value.trim();

      document.getElementById('mainScreen').style.display = 'none';
      document.getElementById('loading').style.display = 'block';

      // 事務仕事の場合は位置情報をスキップ
      if (workType === '事務仕事') {
        sendData(type, workType, comment, "GPS不要", "リモート/事務");
      } else {
        // 現場の場合は位置情報を取得
        if (navigator.geolocation) {
          navigator.geolocation.getCurrentPosition(
            pos => sendData(type, workType, comment, `${pos.coords.latitude},${pos.coords.longitude}`, "取得完了"),
            err => sendData(type, workType, comment, "取得失敗", "不明"),
            { enableHighAccuracy: true, timeout: 5000 }
          );
        } else {
          sendData(type, workType, comment, "非対応", "不明");
        }
      }
    }

    function sendData(type, workType, comment, locationStr, placeName) {
      const data = {
        userId: currentUser.id, userName: currentUser.name, type: type,
        workType: workType, location: locationStr, placeName: placeName, comment: comment
      };

      fetch(GAS_URL, {
        method: "POST", headers: { "Content-Type": "text/plain" },
        body: JSON.stringify({ action: "processTimecard", data: data })
      }).then(r => r.json()).then(res => {
        document.getElementById('loading').style.display = 'none';
        if (res.status === "success") {
          document.getElementById('successScreen').style.display = 'block';
          document.getElementById('resultType').innerText = `${type} (${workType})`;
          document.getElementById('resultTime').innerText = res.timestamp;
        } else {
          showError(res.message);
        }
      }).catch(e => showError("通信エラーが発生しました。"));
    }
  </script>
</body>
</html>
